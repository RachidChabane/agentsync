name: publish

# Publish to PyPI on every GitHub release, via OIDC trusted publishing (no token
# secrets). One-time setup on pypi.org: project "agentsync" -> Publishing -> add
# this repo + workflow ("release.yml", environment blank).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 -m pip install build && python3 -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
